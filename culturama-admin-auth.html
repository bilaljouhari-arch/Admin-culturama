<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culturama Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
:root{--bg:#0E0E16;--sf:#16161F;--sf2:#1E1E2E;--sf3:#252535;--bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.14);--lt:#E8E3F0;--mt:rgba(232,227,240,0.45);--ac:#7C6EFF;--gr:#00C9A7;--rd:#FF4444;--or:#FF8C00;--yw:#FFD600;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--lt);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 50%,rgba(124,110,255,0.08) 0%,transparent 70%)}
.login-box{background:var(--sf);border:1px solid var(--bd2);border-radius:16px;padding:2.5rem;width:400px;text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:0.75rem;margin-bottom:0.5rem}
.login-logo img{height:40px;width:40px;object-fit:contain;border-radius:8px}
.login-brand{font-weight:700;font-size:1.2rem;color:var(--ac)}
.login-sub{font-size:0.82rem;color:var(--mt);margin-bottom:2rem}
.login-err{color:var(--rd);font-size:0.8rem;margin-bottom:0.75rem;display:none;padding:0.5rem;background:rgba(255,68,68,0.1);border-radius:6px}
.login-box input{width:100%;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--r);padding:0.75rem 1rem;color:var(--lt);font-family:'Inter',sans-serif;font-size:0.88rem;margin-bottom:0.75rem;outline:none}
.login-box input:focus{border-color:var(--ac)}
.login-box input::placeholder{color:var(--mt)}
.login-hint{font-size:0.7rem;color:var(--mt);margin-bottom:1rem;text-align:left;line-height:1.5}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.48rem 0.95rem;border-radius:7px;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;white-space:nowrap}
.btn-ac{background:var(--ac);color:#fff;width:100%}.btn-ac:hover{background:#6b5df0}.btn-ac:disabled{background:#4a4470;cursor:not-allowed}
.btn-ok{background:rgba(0,201,167,0.15);color:var(--gr);border:1px solid rgba(0,201,167,0.25)}.btn-ok:hover{background:rgba(0,201,167,0.25)}
.btn-del{background:rgba(255,68,68,0.1);color:var(--rd);border:1px solid rgba(255,68,68,0.2)}.btn-del:hover{background:rgba(255,68,68,0.2)}
.btn-gh{background:var(--sf2);color:var(--lt);border:1px solid var(--bd2)}.btn-gh:hover{background:var(--sf3)}
.btn-sm{padding:0.3rem 0.65rem;font-size:0.76rem}
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}
.layout{display:flex;height:100vh;width:100%}
.sidebar{width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sb-top{padding:1rem 1.25rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:0.6rem}
.sb-top img{height:32px;width:32px;object-fit:contain;border-radius:6px}
.sb-top h1{font-size:0.95rem;font-weight:700;color:var(--ac)}
.sb-top p{font-size:0.65rem;color:var(--mt)}
.sb-nav{padding:0.6rem;flex:1;overflow-y:auto}
.ns{font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--mt);padding:0.65rem 0.5rem 0.3rem}
.ni{display:flex;align-items:center;gap:0.55rem;padding:0.55rem 0.7rem;border-radius:7px;cursor:pointer;color:var(--mt);font-size:0.835rem;font-weight:400;transition:all 0.15s;margin-bottom:0.08rem;border:none;background:none;width:100%;text-align:left}
.ni svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni:hover{color:var(--lt);background:var(--bd)}.ni.active{color:var(--lt);background:rgba(124,110,255,0.15);font-weight:500}
.nb{margin-left:auto;background:var(--rd);color:#fff;font-size:0.62rem;font-weight:700;padding:0.1rem 0.4rem;border-radius:100px;min-width:18px;text-align:center;display:none}
.sb-foot{padding:0.85rem;border-top:1px solid var(--bd)}
.btn-logout{width:100%;background:none;border:1px solid var(--bd2);border-radius:8px;padding:0.5rem;color:var(--mt);font-family:'Inter',sans-serif;font-size:0.8rem;cursor:pointer;transition:all 0.15s}
.btn-logout:hover{color:var(--rd);border-color:var(--rd)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
</style>
</head>

<!-- MAIN APP -->
<div id="app"></div>

<script>
// ===== CONFIG SUPABASE =====
const SUPABASE_URL = 'https://ersrvmxqcitdyinxpbyea.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyc3Z5eHFjaXRkeWlueHBieWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjAyMzcsImV4cCI6MjA5MzkzNjIzN30.XNUvssiHD_boXgzfHIfi20JSecS9RLXNVd4myLmycHg';

// Initialiser Supabase
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== AUTH MANAGEMENT =====
async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMsg = document.getElementById('error-msg');
  const loginBtn = document.getElementById('login-btn');

  if (!email || !password) {
    errorMsg.textContent = 'Email et mot de passe obligatoires';
    errorMsg.style.display = 'block';
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = 'Connexion...';

  try {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      throw new Error(error.message);
    }

    // Succès — sauvegarder la session
    localStorage.setItem('culturama_session', JSON.stringify({
      user: data.user,
      session: data.session
    }));

    // Rediriger vers le panel
    showApp();
  } catch (err) {
    errorMsg.textContent = 'Erreur: ' + err.message;
    errorMsg.style.display = 'block';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Se connecter';
  }
}

async function handleLogout() {
  await supabase.auth.signOut();
  localStorage.removeItem('culturama_session');
  location.reload();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  // TODO: Charger le vrai panel ici
  document.getElementById('app').innerHTML = '<p style="padding: 2rem; color: #E8E3F0;">✅ Authentifié! Panel en construction...</p>';
}

async function checkAuth() {
  // Vérifier s'il y a une session en localStorage
  const saved = localStorage.getItem('culturama_session');
  if (saved) {
    try {
      const { user, session } = JSON.parse(saved);
      // Vérifier que la session est toujours valide
      const { data: { user: currentUser } } = await supabase.auth.getUser();
      if (currentUser) {
        showApp();
        return;
      }
    } catch (e) {
      // Session expirée
      localStorage.removeItem('culturama_session');
    }
  }

  // Sinon, afficher le login
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ===== EVENT LISTENERS =====
document.getElementById('login-btn').addEventListener('click', handleLogin);
document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin();
});

// Initialiser
checkAuth();
</script>
